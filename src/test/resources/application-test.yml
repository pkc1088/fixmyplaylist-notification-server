server:
  port: 8081
  address: 0.0.0.0
  forward-headers-strategy: framework
  shutdown: graceful
  tomcat:
    mbeanregistry:
      enabled: false

resend:
  api-key: "dummy"
  from-email: "dummy"


notification:
  secret: dummy


app:
  kafka:
    topic:
      recovery-completed: dev.recovery.completed.event
      recovery-dlq: dev.recovery.dlq.event


spring:
  application:
    name: kafkaService

  lifecycle:
    timeout-per-shutdown-phase: 10s

  mail:
    host: smtp.gmail.com
    port: 587
    username: pkc1088@gmail.com
    password: dummy
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  kafka:
    bootstrap-servers: dummy
    properties:
      security.protocol: PLAINTEXT # for test
      sasl.mechanism: PLAIN
      sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="dummy" password="dummy";
    consumer:
      group-id: dev-notification-group
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

  datasource:
    url: jdbc:mysql://localhost:3306/dummy_db
    username: dummy
    password: dummy
    hikari:
      maximum-pool-size: 40
      minimum-idle: 5
      idle-timeout: 30000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    open-in-view: false


logging:
  level:
    io.micrometer.stackdriver: ERROR
    org:
      hibernate:
        sql: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE

management:
  endpoints:
    warmup:
      secret: "dummy"
    web:
      exposure:
        include: health
  stackdriver:
    metrics:
      export:
        enabled: false
        project-id: "dummy"
        step: 1m
        connect-timeout: 3s
        read-timeout: 3s
  metrics:
    tags:
      env: "dummy"
      service: "dummy"